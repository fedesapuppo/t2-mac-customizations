# Reference template — do not deploy directly to /etc/.
# $HOME won't resolve correctly in a system-level config.
# The setup script generates a user-specific version with absolute paths.

Debug 0

GenericExecuteSynth \
"export LD_LIBRARY_PATH=$HOME/.local/share/piper-tts/lib && printf %s '$DATA' | $HOME/.local/bin/piper-tts --model $HOME/.local/share/piper-tts/voices/en_US-lessac-medium.onnx --output_raw | paplay --raw --rate=22050 --channels=1 --format=s16le"

GenericCmdDependency "piper-tts"
GenericSoundIconFolder "/usr/share/sounds/sound-icons/"

GenericPunctNone ""
GenericPunctSome ""
GenericPunctAll ""

GenericRateAdd 0
GenericPitchAdd 0
GenericVolumeAdd 0

AddVoice "en" "FEMALE1" "en_US-lessac-medium"
DefaultVoice "en_US-lessac-medium"
